services:
  - type: web
    name: bidmasters-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this in Render dashboard
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL
      - key: GEMINI_API_KEY
        sync: false   # Optional
